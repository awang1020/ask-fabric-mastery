name: Weekly refresh & deploy

# Triggers
#   1. Cron every Tuesday at 09:30 UTC (= ~10:30/11:30 Paris, safely after the
#      8h CET publication slot).
#   2. Manual dispatch from the Actions tab.
#   3. Push to main on app/data/infra changes (so a code change ships).
on:
  schedule:
    - cron: '30 9 * * 2'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'src/**'
      - 'scripts/ingest_substack.py'
      - 'scripts/build_index.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.streamlit/**'
      - '.github/workflows/refresh.yml'

permissions:
  id-token: write      # OIDC for azure/login
  contents: read
  packages: write      # push to ghcr.io

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Ingest, embed, build image, deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate runtime .env for the build pipeline
        run: |
          cat > .env <<EOF
          AZURE_OPENAI_ENDPOINT=${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_CHAT_DEPLOYMENT=${{ vars.AZURE_OPENAI_CHAT_DEPLOYMENT }}
          AZURE_OPENAI_CHAT_MODEL=${{ vars.AZURE_OPENAI_CHAT_MODEL }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT=${{ vars.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_OPENAI_EMBEDDING_MODEL=${{ vars.AZURE_OPENAI_EMBEDDING_MODEL }}
          AZURE_OPENAI_API_VERSION=2024-10-21
          DATA_DIR=./data/newsletters
          STORAGE_DIR=./storage/chroma
          COLLECTION_NAME=fabric_mastery
          DEFAULT_LANGUAGE=fr
          EOF

      - name: Ingest Substack archive
        run: python -m scripts.ingest_substack --skip-paywalled --delay 0.4

      - name: Build vector index (Entra ID via az login)
        run: python -m scripts.build_index --rebuild

      - name: Compute lowercase image name + tag
        id: img
        env:
          REPO: ${{ github.repository }}
        run: |
          LOWER_REPO=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${LOWER_REPO}/ask-fabric-mastery"
          TAG=$(date -u +'%Y%m%d-%H%M%S')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:latest
            ${{ steps.img.outputs.image }}:${{ steps.img.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Roll new revision on Container App
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ steps.img.outputs.image }}:${{ steps.img.outputs.tag }}" \
            --only-show-errors

      - name: Resolve app URL
        run: |
          FQDN=$(az containerapp show \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          {
            echo "## 🚀 Deployment complete"
            echo ""
            echo "- **Image:** \`${{ steps.img.outputs.image }}:${{ steps.img.outputs.tag }}\`"
            echo "- **URL:** https://$FQDN"
          } >> "$GITHUB_STEP_SUMMARY"
