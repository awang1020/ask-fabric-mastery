name: Probe Substack endpoints

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe sitemap and feed
        run: |
          set +e
          UA='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'
          for URL in \
            https://antoinewang.substack.com/sitemap.xml \
            https://antoinewang.substack.com/feed \
            https://antoinewang.substack.com/api/v1/archive \
            https://antoinewang.substack.com/ ; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -A "$UA" -H "Accept: text/html,application/xml" "$URL")
            echo "  $CODE  $URL"
          done
